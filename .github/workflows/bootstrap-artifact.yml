name: Bootstrap artifact

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: bootstrap-artifact-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    name: Build exact bootstrap closure
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install build frontend
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: ${{ github.event_name != 'pull_request' }}
          python-version: "3.11.15"

      - name: Validate bootstrap contracts
        run: uv run --frozen python -m unittest tests.mastic.test_bootstrap_artifact_v1

      - name: Build exact closure and generated installer
        shell: zsh {0}
        run: |
          set -euo pipefail
          uv build --wheel \
            --build-constraints packaging/build-backend.lock \
            --require-hashes
          wheels=(dist/mastic-*-py3-none-any.whl(N))
          (( ${#wheels} == 1 ))
          version=${${wheels[1]:t}#mastic-}
          version=${version%-py3-none-any.whl}
          closure="dist/mastic-bootstrap-closure-${version}-macos-arm64.tar.gz"
          release_tag=''
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            release_tag=$GITHUB_REF_NAME
          fi
          closure_args=("$wheels[1]" "$closure")
          bootstrap_args=("$wheels[1]" "$closure" dist/bootstrap-mastic.zsh)
          if [[ -n $release_tag ]]; then
            closure_args+=("$release_tag")
            bootstrap_args+=("$release_tag")
          fi
          zsh scripts/build-bootstrap-closure.zsh "${closure_args[@]}"
          zsh scripts/build-bootstrap.zsh "${bootstrap_args[@]}"
          dist/bootstrap-mastic.zsh --dry-run
          extract_dir=$(mktemp -d "${RUNNER_TEMP}/mastic-release.XXXXXXXX")
          trap 'rm -rf -- "$extract_dir"' EXIT
          tar -xzf "$closure" -C "$extract_dir" \
            ./application-targets-v1/artifacts/hindsight-api-0.8.4-macos-arm64.tar.gz
          cp \
            "$extract_dir/application-targets-v1/artifacts/hindsight-api-0.8.4-macos-arm64.tar.gz" \
            dist/hindsight-api-0.8.4-macos-arm64.tar.gz
          for artifact in \
            "$wheels[1]" \
            "$closure" \
            dist/bootstrap-mastic.zsh \
            dist/hindsight-api-0.8.4-macos-arm64.tar.gz; do
            digest=$(shasum -a 256 "$artifact")
            digest=${digest%% *}
            print -r -- "${digest}  ${artifact:t}" >"$artifact.sha256"
          done

      - name: Upload exact release inputs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mastic-bootstrap-${{ github.sha }}
          path: |
            dist/mastic-*-py3-none-any.whl
            dist/mastic-*-py3-none-any.whl.sha256
            dist/mastic-bootstrap-closure-*-macos-arm64.tar.gz
            dist/mastic-bootstrap-closure-*-macos-arm64.tar.gz.sha256
            dist/bootstrap-mastic.zsh
            dist/bootstrap-mastic.zsh.sha256
            dist/hindsight-api-0.8.4-macos-arm64.tar.gz
            dist/hindsight-api-0.8.4-macos-arm64.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14

  host-contract:
    name: Exercise bootstrap · macOS ${{ matrix.macos }}
    needs: [package]
    strategy:
      fail-fast: false
      matrix:
        macos: ["15", "26"]
    runs-on: macos-${{ matrix.macos }}
    steps:
      - name: Download exact release inputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mastic-bootstrap-${{ github.sha }}
          path: dist

      - name: Validate the real runner without mutation
        shell: zsh {0}
        run: |
          set -euo pipefail
          chmod 0755 dist/bootstrap-mastic.zsh
          dist/bootstrap-mastic.zsh --dry-run

      - name: Verify download-layout checksums and install offline
        shell: zsh {0}
        run: |
          set -euo pipefail
          checksums=(dist/*.sha256(N))
          (( ${#checksums} == 4 ))
          for checksum in $checksums; do
            (cd dist && shasum -c "${checksum:t}")
          done

          install_home=$(mktemp -d "${RUNNER_TEMP}/mastic-install.XXXXXXXX")
          trap 'rm -rf -- "$install_home"' EXIT
          mastic_data="$install_home/mastic-data"
          HOME="$install_home" \
          MASTIC_DATA_DIR="$mastic_data" \
          UV_OFFLINE=1 \
          PIP_NO_INDEX=1 \
          HTTP_PROXY=http://127.0.0.1:1 \
          HTTPS_PROXY=http://127.0.0.1:1 \
          ALL_PROXY=http://127.0.0.1:1 \
          NO_PROXY='' \
            dist/bootstrap-mastic.zsh \
              --artifact-dir "${PWD}/dist" \
              --yes

          "$install_home/.local/bin/mastic" --help >/dev/null
          "$install_home/.local/bin/masticd" --help >/dev/null
          [[ $("$mastic_data/bootstrap-uv/uv" --version) == 'uv 0.11.29'* ]]
          [[ $("$mastic_data/bootstrap-python/bin/python3.11" --version) == 'Python 3.11.15' ]]
          [[ -f "$mastic_data/bootstrap-artifacts/bootstrap-receipt.json" ]]

      - name: Reinstall over a running Supervisor
        shell: zsh {0}
        run: |
          set -euo pipefail
          mastic="$HOME/.local/bin/mastic"
          mastic_data="$HOME/.local/share/mastic"
          target="gui/${UID}/io.nisavid.masticd"
          cleanup() {
            "$mastic" supervisor stop >/dev/null 2>&1 || true
            launchctl bootout "$target" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          HOME="$HOME" \
          MASTIC_DATA_DIR="$mastic_data" \
          UV_OFFLINE=1 \
          PIP_NO_INDEX=1 \
          HTTP_PROXY=http://127.0.0.1:1 \
          HTTPS_PROXY=http://127.0.0.1:1 \
          ALL_PROXY=http://127.0.0.1:1 \
          NO_PROXY='' \
            dist/bootstrap-mastic.zsh \
              --artifact-dir "${PWD}/dist" \
              --yes

          installed_python="$mastic_data/tools/mastic/bin/python"
          operation_ports=$(
            "$installed_python" -c \
              'import mastic.infrastructure.operation_ports as module; print(module.__file__)'
          )
          "$installed_python" -c \
            'from pathlib import Path; import sys; path=Path(sys.argv[1]); source=path.read_text(); old="elif operation == \"supervisor.restart\":\n            value = self._supervisor.restart()"; new="elif operation == \"supervisor.restart\":\n            raise RuntimeError(\"stale-generation-sentinel\")"; assert source.count(old) == 1; path.write_text(source.replace(old, new))' \
            "$operation_ports"

          "$mastic" supervisor start
          before_status=$(launchctl print "$target")
          [[ $before_status =~ 'pid[[:space:]]*=[[:space:]]*([0-9]+)' ]]
          before_pid=$match[1]
          if stale_result=$("$mastic" supervisor restart 2>&1); then
            print -ru2 -- 'fault-injected Supervisor unexpectedly accepted restart'
            exit 1
          fi
          [[ $stale_result == *stale-generation-sentinel* ]]

          HOME="$HOME" \
          MASTIC_DATA_DIR="$mastic_data" \
          UV_OFFLINE=1 \
          PIP_NO_INDEX=1 \
          HTTP_PROXY=http://127.0.0.1:1 \
          HTTPS_PROXY=http://127.0.0.1:1 \
          ALL_PROXY=http://127.0.0.1:1 \
          NO_PROXY='' \
            dist/bootstrap-mastic.zsh \
              --artifact-dir "${PWD}/dist" \
              --yes

          after_status=$(launchctl print "$target")
          [[ $after_status =~ 'pid[[:space:]]*=[[:space:]]*([0-9]+)' ]]
          after_pid=$match[1]
          [[ $after_pid != $before_pid ]]
          ! rg -q stale-generation-sentinel "$operation_ports"
          "$mastic" supervisor restart
          "$mastic" supervisor status --json >/dev/null
          "$mastic" gateway status --json >/dev/null

  publish:
    name: Attest and publish tagged artifact
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [host-contract, package]
    runs-on: macos-15
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Download exact release inputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mastic-bootstrap-${{ github.sha }}
          path: dist

      - name: Attest release inputs
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist/*"

      - name: Publish versioned GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
