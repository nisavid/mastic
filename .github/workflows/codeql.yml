name: CodeQL Advanced

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL security and quality
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20

      - name: Test vendored Impeccable security boundaries
        run: |
          node --test .agents/skills/impeccable/scripts/live-security.test.mjs
          node --test .github/skills/impeccable/scripts/live-security.test.mjs

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          build-mode: none
          languages: python
          config: |
            queries:
              - uses: security-and-quality
            query-filters:
              # Protocol method bodies intentionally use `...`; CodeQL treats
              # those interface declarations as executable no-op statements.
              - exclude:
                  id: py/ineffectual-statement

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          category: /language:python
