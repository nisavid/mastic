name: Python quality

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: python-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Test and type-check
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: ${{ github.event_name != 'pull_request' }}
          python-version: "3.11.15"

      - name: Install project and development tools
        run: uv sync --locked --dev

      - name: Type-check with Pyrefly
        run: uv run --frozen pyrefly check --output-format=github

      - name: Lint with Ruff
        run: uv run --frozen ruff check .

      - name: Check formatting with Ruff
        run: uv run --frozen ruff format --check .

      - name: Run tests
        run: uv run --frozen python -m unittest discover -s tests -t .

      - name: Build distributions
        run: >-
          uv build
          --build-constraints packaging/build-backend.lock
          --require-hashes
